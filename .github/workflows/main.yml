name: CI

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - linux/**
      - crates/dmesh/**
      - .github/workflows/kernel-cloud.yml
      - .github/workflows/dmesh.yml
  pull_request:
    paths-ignore:
      - linux/**
      - crates/dmesh/**
      - .github/workflows/kernel-cloud.yml
      - .github/workflows/dmesh.yml

permissions:
  contents: write
  packages: write

jobs:
  # ── Nix build: native x86_64 ───────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build main Nix target
        run: nix build .#default -o result-default --print-build-logs

      - name: Build Nix Docker image
        run: nix build .#sshm -o result-sshm --print-build-logs

      - name: Create NAR archive
        run: |
          mkdir -p artifacts
          nix-store --dump ./result-default > artifacts/ssh-mesh-main-x86_64-linux.nar
          ls -lh artifacts/

      - name: Upload NAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nar-x86_64-linux
          path: artifacts/*.nar
          retention-days: 90

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        if: github.event_name != 'pull_request'
        run: |
          docker load < result-sshm
          docker push ghcr.io/costinm/sshm:latest

  # ── Release: attach NARs to GitHub releases ────────────────────
  release:
    name: Attach NARs to release
    needs: [build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all NAR artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nar-*
          merge-multiple: true
          path: artifacts

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.nar
