<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔭 Trace Hub — Local Observability</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f13;
            --bg-secondary: #16161d;
            --bg-tertiary: #1c1c26;
            --bg-card: #1e1e28;
            --border: #2a2a3a;
            --text-primary: #e4e4ef;
            --text-secondary: #8888a0;
            --text-muted: #555570;
            --accent: #6c63ff;
            --accent-glow: rgba(108, 99, 255, 0.15);
            --green: #3dd68c;
            --green-dim: rgba(61, 214, 140, 0.12);
            --red: #ff6b6b;
            --red-dim: rgba(255, 107, 107, 0.12);
            --yellow: #ffd93d;
            --yellow-dim: rgba(255, 217, 61, 0.12);
            --blue: #4da6ff;
            --blue-dim: rgba(77, 166, 255, 0.12);
            --cyan: #4ec9b0;
            --purple: #b18cfe;
            --orange: #ff9f43;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: grid;
            grid-template-columns: 280px 1fr;
            grid-template-rows: 56px 1fr;
            height: 100vh;
            overflow: hidden;
        }

        /* Header */
        .header {
            grid-column: 1 / -1;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 10;
        }

        .header h1 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header h1 span {
            font-size: 18px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        /* Sidebar */
        .sidebar {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .sidebar-section h3 {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
            padding: 0 8px;
        }

        .source-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.15s;
            font-size: 13px;
        }

        .source-item:hover {
            background: var(--bg-tertiary);
        }

        .source-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .source-dot.connected {
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
        }

        .source-dot.disconnected {
            background: var(--text-muted);
        }

        .source-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .source-toggle {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
        }

        .source-toggle:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .source-toggle.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* Panels */
        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .panel-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .panel-status {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 500;
        }

        .panel-status.active {
            background: var(--green-dim);
            color: var(--green);
        }

        .panel-status.inactive {
            background: var(--red-dim);
            color: var(--red);
        }

        .panel-body {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .panel-input {
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 6px 10px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            margin-top: 6px;
        }

        .panel-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* Main content */
        .main {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Controls bar */
        .controls {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-buttons {
            display: flex;
            gap: 4px;
        }

        .filter-btn {
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 500;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            transition: all 0.15s;
            font-family: 'Inter', sans-serif;
        }

        .filter-btn.trace {
            background: var(--bg-tertiary);
            color: var(--text-muted);
        }

        .filter-btn.debug {
            background: var(--bg-tertiary);
            color: var(--cyan);
        }

        .filter-btn.info {
            background: var(--bg-tertiary);
            color: var(--blue);
        }

        .filter-btn.warn {
            background: var(--bg-tertiary);
            color: var(--yellow);
        }

        .filter-btn.error {
            background: var(--bg-tertiary);
            color: var(--red);
        }

        .filter-btn.active {
            opacity: 1;
            font-weight: 600;
        }

        .filter-btn:not(.active) {
            opacity: 0.4;
        }

        .search-input {
            flex: 1;
            min-width: 150px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-family: 'Inter', sans-serif;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .btn {
            padding: 5px 12px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.15s;
        }

        .btn:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .btn-primary:hover {
            background: #5a52e0;
        }

        /* Log entries */
        #logs {
            flex: 1;
            overflow-y: auto;
            padding: 8px 16px;
            font-family: 'JetBrains Mono', monospace;
        }

        .log-entry {
            display: grid;
            grid-template-columns: 80px 42px 90px 1fr;
            gap: 8px;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            line-height: 1.6;
            animation: fadeIn 0.15s ease-out;
            border-left: 2px solid transparent;
        }

        .log-entry:hover {
            background: var(--bg-tertiary);
        }

        .log-entry.trace {
            border-left-color: var(--text-muted);
        }

        .log-entry.debug {
            border-left-color: var(--cyan);
        }

        .log-entry.info {
            border-left-color: var(--blue);
        }

        .log-entry.warn {
            border-left-color: var(--yellow);
        }

        .log-entry.error {
            border-left-color: var(--red);
        }

        .log-entry.hidden {
            display: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-2px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .log-time {
            color: var(--text-muted);
            font-size: 11px;
        }

        .log-level {
            font-weight: 600;
            font-size: 10px;
            text-transform: uppercase;
        }

        .log-level.trace {
            color: var(--text-muted);
        }

        .log-level.debug {
            color: var(--cyan);
        }

        .log-level.info {
            color: var(--blue);
        }

        .log-level.warn {
            color: var(--yellow);
        }

        .log-level.error {
            color: var(--red);
        }

        .log-source {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 3px;
            background: var(--accent-glow);
            color: var(--accent);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 90px;
            display: inline-block;
        }

        .log-message {
            color: var(--text-primary);
            word-break: break-word;
        }

        .log-target {
            color: var(--text-muted);
            font-size: 11px;
        }

        .log-fields {
            grid-column: 1 / -1;
            color: var(--purple);
            font-size: 11px;
            padding-left: 220px;
        }

        /* Stats bar */
        .stats {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 6px 16px;
            display: flex;
            gap: 16px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .stat-value {
            color: var(--accent);
            font-weight: 600;
        }

        label {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        label input[type="checkbox"] {
            accent-color: var(--accent);
        }
    </style>
</head>

<body>
    <div class="header">
        <h1><span>🔭</span> Trace Hub</h1>
        <div class="header-actions">
            <button class="btn" id="refresh-btn">⟳ Refresh Sources</button>
            <button class="btn" id="clear-btn">Clear</button>
            <label><input type="checkbox" id="auto-scroll" checked> Auto-scroll</label>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-section">
            <h3>Trace Sources</h3>
            <div id="sources-list">
                <div class="source-item" style="color: var(--text-muted); font-style: italic;">
                    No sources discovered
                </div>
            </div>
        </div>

        <div class="sidebar-section">
            <h3>Perfetto Tracer</h3>
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">Consumer</span>
                    <span class="panel-status inactive" id="perfetto-status">Idle</span>
                </div>
                <div class="panel-body">
                    <input type="text" class="panel-input" id="perfetto-socket" value="/tmp/perfetto-consumer"
                        placeholder="Consumer socket path">
                    <div style="margin-top: 8px; display: flex; gap: 6px;">
                        <button class="btn btn-primary" id="perfetto-pull-btn" style="flex:1">Pull Trace</button>
                        <input type="number" class="panel-input" id="perfetto-duration" value="10" min="1" max="300"
                            style="width: 60px; margin-top: 0;">
                        <span style="font-size: 11px; color: var(--text-muted); align-self: center;">sec</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="sidebar-section">
            <h3>OTEL Export</h3>
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">OTLP Push</span>
                    <span class="panel-status inactive" id="otel-status">Inactive</span>
                </div>
                <div class="panel-body">
                    <input type="text" class="panel-input" id="otel-endpoint" placeholder="OTEL_EXPORTER_OTLP_ENDPOINT"
                        readonly>
                    <button class="btn" id="otel-toggle-btn" style="margin-top: 8px; width: 100%">
                        Start Push
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="main">
        <div class="controls">
            <div class="filter-buttons">
                <button class="filter-btn trace active" data-level="trace">TRACE</button>
                <button class="filter-btn debug active" data-level="debug">DEBUG</button>
                <button class="filter-btn info active" data-level="info">INFO</button>
                <button class="filter-btn warn active" data-level="warn">WARN</button>
                <button class="filter-btn error active" data-level="error">ERROR</button>
            </div>
            <input type="text" class="search-input" id="search" placeholder="Filter by text...">
        </div>

        <div id="logs"></div>

        <div class="stats">
            <div>Total: <span class="stat-value" id="total-count">0</span></div>
            <div>Trace: <span class="stat-value" id="trace-count">0</span></div>
            <div>Debug: <span class="stat-value" id="debug-count">0</span></div>
            <div>Info: <span class="stat-value" id="info-count">0</span></div>
            <div>Warn: <span class="stat-value" id="warn-count">0</span></div>
            <div>Error: <span class="stat-value" id="error-count">0</span></div>
            <div style="margin-left: auto">Sources: <span class="stat-value" id="sources-count">0</span></div>
        </div>
    </div>

    <script>
        let connection = null;
        let activeFilters = new Set(['trace', 'debug', 'info', 'warn', 'error']);
        let counts = { total: 0, trace: 0, debug: 0, info: 0, warn: 0, error: 0 };
        let connectedSources = new Set();
        const MAX_ENTRIES = 2000;

        const logsDiv = document.getElementById('logs');
        const searchInput = document.getElementById('search');

        // ── Source management ──────────────────────────────────

        async function refreshSources() {
            try {
                const res = await fetch('/api/discover');
                const sockets = await res.json();
                renderSources(sockets);
            } catch (e) {
                console.error('Failed to discover sources:', e);
            }
        }

        function renderSources(sockets) {
            const list = document.getElementById('sources-list');
            if (sockets.length === 0) {
                list.innerHTML = '<div class="source-item" style="color: var(--text-muted); font-style: italic;">No sources discovered</div>';
                return;
            }

            list.innerHTML = sockets.map(s => `
                <div class="source-item" data-name="${s.name}" data-path="${s.path}">
                    <span class="source-dot ${s.connected ? 'connected' : 'disconnected'}"></span>
                    <span class="source-name">${s.name}</span>
                    <button class="source-toggle ${s.connected ? 'active' : ''}"
                        onclick="toggleSource('${s.name}', '${s.path}', ${s.connected})">
                        ${s.connected ? 'On' : 'Off'}
                    </button>
                </div>
            `).join('');

            document.getElementById('sources-count').textContent = sockets.filter(s => s.connected).length;
        }

        async function toggleSource(name, path, isConnected) {
            try {
                if (isConnected) {
                    await fetch(`/api/sources/disconnect?name=${encodeURIComponent(name)}`);
                    connectedSources.delete(name);
                } else {
                    await fetch(`/api/sources/connect?name=${encodeURIComponent(name)}&path=${encodeURIComponent(path)}`);
                    connectedSources.add(name);
                }
                await refreshSources();
                reconnectStream();
            } catch (e) {
                console.error('Toggle source error:', e);
            }
        }

        // ── SSE streaming ─────────────────────────────────────

        function connectStream() {
            if (connection) connection.close();
            connection = new EventSource('/api/stream');

            connection.onmessage = (event) => {
                const log = JSON.parse(event.data);
                addLogEntry(log);
            };

            connection.onerror = () => {
                if (connection.readyState === EventSource.CLOSED) {
                    setTimeout(connectStream, 2000);
                }
            };
        }

        function reconnectStream() {
            if (connection) connection.close();
            connectStream();
        }

        // ── Log entries ───────────────────────────────────────

        function addLogEntry(log) {
            const entry = document.createElement('div');
            const level = log.level || 'info';
            entry.className = `log-entry ${level}`;

            if (!activeFilters.has(level)) entry.classList.add('hidden');

            const searchTerm = searchInput.value.toLowerCase();
            if (searchTerm && !(log.message || '').toLowerCase().includes(searchTerm)
                && !(log.target || '').toLowerCase().includes(searchTerm)
                && !(log.source || '').toLowerCase().includes(searchTerm)) {
                entry.classList.add('hidden');
            }

            const ts = log.timestamp ? new Date(log.timestamp).toLocaleTimeString() : '';
            const source = log.source || '—';

            let html = `
                <span class="log-time">${ts}</span>
                <span class="log-level ${level}">${level}</span>
                <span class="log-source" title="${source}">${source}</span>
                <span class="log-message">${escapeHtml(log.message || '')} <span class="log-target">${log.target || ''}</span></span>
            `;

            if (log.fields && Object.keys(log.fields).length > 0) {
                html += `<div class="log-fields">${JSON.stringify(log.fields)}</div>`;
            }

            entry.innerHTML = html;
            logsDiv.appendChild(entry);

            counts.total++;
            counts[level] = (counts[level] || 0) + 1;
            updateCounts();

            while (logsDiv.children.length > MAX_ENTRIES) {
                logsDiv.removeChild(logsDiv.firstChild);
            }

            if (document.getElementById('auto-scroll').checked) {
                logsDiv.scrollTop = logsDiv.scrollHeight;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updateCounts() {
            document.getElementById('total-count').textContent = counts.total;
            for (const lvl of ['trace', 'debug', 'info', 'warn', 'error']) {
                document.getElementById(`${lvl}-count`).textContent = counts[lvl] || 0;
            }
        }

        // ── Filters ───────────────────────────────────────────

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const level = btn.dataset.level;
                if (activeFilters.has(level)) {
                    activeFilters.delete(level);
                    btn.classList.remove('active');
                } else {
                    activeFilters.add(level);
                    btn.classList.add('active');
                }
                applyFilters();
            });
        });

        searchInput.addEventListener('input', () => applyFilters());

        function applyFilters() {
            const searchTerm = searchInput.value.toLowerCase();
            document.querySelectorAll('.log-entry').forEach(el => {
                const level = [...el.classList].find(c => ['trace', 'debug', 'info', 'warn', 'error'].includes(c));
                let visible = activeFilters.has(level);
                if (visible && searchTerm) {
                    const text = el.textContent.toLowerCase();
                    visible = text.includes(searchTerm);
                }
                el.classList.toggle('hidden', !visible);
            });
        }

        // ── Clear ─────────────────────────────────────────────

        document.getElementById('clear-btn').addEventListener('click', () => {
            logsDiv.innerHTML = '';
            counts = { total: 0, trace: 0, debug: 0, info: 0, warn: 0, error: 0 };
            updateCounts();
        });

        // ── Refresh sources ───────────────────────────────────

        document.getElementById('refresh-btn').addEventListener('click', refreshSources);

        // ── Perfetto panel ────────────────────────────────────

        document.getElementById('perfetto-pull-btn').addEventListener('click', async () => {
            const socket = document.getElementById('perfetto-socket').value;
            const duration = document.getElementById('perfetto-duration').value;
            const statusEl = document.getElementById('perfetto-status');

            statusEl.textContent = 'Pulling…';
            statusEl.className = 'panel-status active';

            try {
                const res = await fetch(`/api/perfetto/pull?socket=${encodeURIComponent(socket)}&duration=${duration}`, { method: 'POST' });
                if (res.ok) {
                    statusEl.textContent = 'Done';
                } else {
                    statusEl.textContent = 'Failed';
                    statusEl.className = 'panel-status inactive';
                }
            } catch (e) {
                statusEl.textContent = 'Error';
                statusEl.className = 'panel-status inactive';
            }

            setTimeout(() => {
                statusEl.textContent = 'Idle';
                statusEl.className = 'panel-status inactive';
            }, 3000);
        });

        // ── OTEL panel ────────────────────────────────────────

        async function refreshOtelStatus() {
            try {
                const res = await fetch('/api/otel');
                const status = await res.json();
                const statusEl = document.getElementById('otel-status');
                const endpointEl = document.getElementById('otel-endpoint');
                const toggleBtn = document.getElementById('otel-toggle-btn');

                if (status.endpoint) {
                    endpointEl.value = status.endpoint;
                } else {
                    endpointEl.value = 'Not configured';
                }

                if (status.active) {
                    statusEl.textContent = 'Active';
                    statusEl.className = 'panel-status active';
                    toggleBtn.textContent = 'Stop Push';
                    toggleBtn.classList.add('btn-primary');
                } else {
                    statusEl.textContent = 'Inactive';
                    statusEl.className = 'panel-status inactive';
                    toggleBtn.textContent = 'Start Push';
                    toggleBtn.classList.remove('btn-primary');
                }
            } catch (e) {
                console.error('Failed to get OTEL status:', e);
            }
        }

        document.getElementById('otel-toggle-btn').addEventListener('click', async () => {
            try {
                await fetch('/api/otel/toggle', { method: 'POST' });
                await refreshOtelStatus();
            } catch (e) {
                console.error('Failed to toggle OTEL push:', e);
            }
        });

        // ── Init ──────────────────────────────────────────────

        refreshSources();
        refreshOtelStatus();
        connectStream();

        // Periodic refresh
        setInterval(refreshSources, 10000);
    </script>
</body>

</html>
