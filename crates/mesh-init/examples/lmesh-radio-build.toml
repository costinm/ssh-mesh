# Build-user lmesh radio service with ambient radio capabilities.
#
# Service name from filename: lmesh-radio-build
# Runtime dir: /run/mesh/lmesh
# mesh-init creates /run/mesh/lmesh and chowns it to User/Group.

[Service]
Type = "exec"

# Use the checked build explicitly for this local lab service. This avoids
# accidentally starting an older profile binary with incompatible forwarding.
ExecStart = "/ws/rust/ssh-mesh/target/x86_64-unknown-linux-musl/debug/lmesh"

# Symlink to the build target
WorkingDirectory = "target"

# Avoid root. Normally should be 'net' - but for testing use the dev user ( I use 'build' )
User = "build"
Group = "build"
# For access to WPA control sockets and USB serial devices on deb-like systems.
SupplementaryGroups = ["plugdev", "dialout"]

# It could also be on-demand if only handling eth.
Restart = "always"
RestartSec = "1s"
KillMode = "control-group"

TimeoutStopSec = "2s"

NoNewPrivileges = false

CapabilityBoundingSet = [
  "CAP_SETPCAP",
  "CAP_NET_ADMIN",
  "CAP_NET_RAW",
]
AmbientCapabilities = [
  "CAP_NET_ADMIN",
  "CAP_NET_RAW",
]

StandardOutput = "inherit"
StandardError = "inherit"

[Environment]
RUST_LOG = "info,lmesh=debug"
HOME = "lmesh-radio-build/home"
MESH_HOME = "lmesh-radio-build/mesh"
MESH_LOG_FILE = "lmesh-radio-build/log/lmesh.log"
MESH_LOG_DIR = "lmesh-radio-build/log"

# Special name with build - separate from the 'main' one.
LMESH_CONTROL_SOCKET = "/run/mesh/lmesh/mesh.sock"
# lmesh automatically loads /home/system/etc/lmesh/lmesh.toml. Set
# LMESH_CONFIG_FILE only for an isolated or non-system deployment.

LMESH_WIFI_IFACE = "wlan1"
LMESH_WPA_CTRL_DIR = "/run/mesh/wpa-supplicant-nan"
