[service]
name = "unpfs"
command = "./unpfs"
args = ["/tmp"]
priority = 400
oneshot = false

[resources]
memory_max = "128M"
cpu_weight = 50

[environment]
RUST_LOG = "info"

# Socket activation: inetd-style, per-connection.
# mesh-init accepts the TCP connection and passes the socket FD
# as stdin/stdout to unpfs (which already supports this mode).
[[activation]]
port = 14009
wait = false
