[Service]
ExecStart = "echo 'Mocking sync data!'"
OOMScoreAdjust = -700

persisted = true
save_result = true

[Schedule]
periodic_secs = 3600
flex_secs = 900

[Constraints]
network_type = "unmetered"
requires_charging = false
requires_battery_not_low = true

[Constraints.custom]
vpn_connected = true

[Backoff]
initial_secs = 30
policy = "exponential"
max_retries = 5

[Environment]
SYNC_MODE = "incremental"
