<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Monitor</title>
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --success: #4cc9f0;
            --danger: #f72585;
            --warning: #f8961e;
            --info: #4895ef;
            --light: #f8f9fa;
            --dark: #212529;
            --gray: #6c757d;
            --gray-light: #e9ecef;
            --border: #dee2e6;
            --card-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fb;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            width: 100%;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            margin: 0;
            padding: 0;
            max-width: 100%;
            box-sizing: border-box;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            margin-bottom: 25px;
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
        }

        .process-card,
        .log-card {
            background: white;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
        }

        .card-body {
            padding: 0;
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
        }

        .process-table-container {
            flex: 1;
            overflow-y: auto;
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
        }

        #process-table {
            width: 100%;
            table-layout: fixed;
            min-width: 100%;
            box-sizing: border-box;
        }

        #process-table col {
            width: 16.666%;
        }

        header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: var(--card-shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .header-content h1 {
            font-size: 1.6rem;
            margin-bottom: 4px;
        }

        .header-content p {
            opacity: 0.9;
            font-size: 0.9rem;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255, 255, 255, 0.15);
            padding: 12px 20px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: var(--transition);
            user-select: none;
        }

        .status-bar:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .status-bar.paused {
            background: rgba(247, 37, 133, 0.3);
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .connected {
            background-color: #28a745;
        }

        .disconnected {
            background-color: #dc3545;
        }

        .process-count {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: var(--transition);
            box-shadow: var(--card-shadow);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background: linear-gradient(135deg, var(--info), #3a86ff);
        }

        button.warning {
            background: linear-gradient(135deg, var(--warning), #f3722c);
        }

        button:disabled {
            background: var(--gray-light);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }


        .card-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 18px 25px;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .card-body {
            padding: 0;
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .process-table-container {
            flex: 1;
            overflow-y: auto;
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
        }

        #process-table {
            width: 100%;
            table-layout: fixed;
            min-width: 100%;
        }

        #process-table th,
        #process-table td {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Ensure columns are distributed properly */
        #process-table col:nth-child(1) {
            width: 6%;
        }

        #process-table col:nth-child(2) {
            width: 6%;
        }

        #process-table col:nth-child(3) {
            width: 12%;
        }

        #process-table col:nth-child(4) {
            width: 12%;
        }

        #process-table col:nth-child(5) {
            width: 64%;
        }

        /* For responsive design */
        @media (max-width: 768px) {
            #process-table col:nth-child(1) {
                width: 15%;
            }

            #process-table col:nth-child(2) {
                width: 15%;
            }

            #process-table col:nth-child(3) {
                width: 20%;
            }

            #process-table col:nth-child(4) {
                width: 25%;
            }

            #process-table col:nth-child(5) {
                width: 15%;
            }
        }

        th {
            background-color: #f8f9fa;
            font-weight: 600;
            text-align: left;
            padding: 15px 20px;
            border-bottom: 2px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
            min-width: 0;
        }

        td {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            min-width: 0;
        }

        tr:hover {
            background-color: rgba(67, 97, 238, 0.05);
        }

        tr:nth-child(even) {
            background-color: rgba(0, 0, 0, 0.02);
        }

        .process-row {
            border-bottom: 2px solid var(--border);
        }

        .process-main {
            font-weight: 500;
        }

        .process-memory {
            font-size: 0.85rem;
            color: var(--gray);
            padding-top: 0;
        }

        .memory-details {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 5px;
            width: 100%;
            overflow: hidden;
        }

        .memory-item {
            display: flex;
            justify-content: space-between;
        }

        .memory-label {
            font-weight: 600;
            margin-right: 5px;
        }

        .memory-value {
            font-family: 'Courier New', monospace;
        }

        .pid-cell {
            font-weight: 600;
            color: var(--primary);
            width: 8ch;
            max-width: 8ch;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .comm-cell {
            font-weight: 500;
        }

        .cmdline-cell {
            font-size: 0.85rem;
            color: var(--gray);
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .log-content {
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            background-color: #2c3e50;
            color: #ecf0f1;
        }

        .log-entry {
            margin-bottom: 8px;
            padding: 8px;
            border-radius: 4px;
            background-color: rgba(255, 255, 255, 0.05);
        }

        .log-timestamp {
            color: #95a5a6;
            font-weight: 600;
        }

        .log-error {
            color: #e74c3c;
        }

        .log-info {
            color: #3498db;
        }

        .log-success {
            color: #2ecc71;
        }

        .log-warning {
            color: #f39c12;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--gray);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        .search-box {
            padding: 12px 20px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            width: 100%;
            margin-bottom: 20px;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.2);
        }

        .stats-bar {
            display: flex;
            gap: 20px;
            padding: 15px 25px;
            background-color: #f8f9fa;
            border-bottom: 1px solid var(--border);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--gray);
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: 600;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: var(--gray);
            font-size: 0.9rem;
            margin-top: 20px;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            header {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }

            .status-bar {
                width: 100%;
                justify-content: center;
            }

            .controls {
                flex-direction: column;
            }

            button {
                width: 100%;
                justify-content: center;
            }

            th,
            td {
                padding: 10px 12px;
            }

            .cmdline-cell,
            .cgroup-cell {
                max-width: 150px;
            }
        }

        /* CGroup Panel Modal */
        .cgroup-panel-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .cgroup-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            z-index: 1001;
        }

        .cgroup-panel-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .cgroup-panel-header h2 {
            margin: 0;
            font-size: 1.3rem;
        }

        .cgroup-panel-close {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px 12px;
            border-radius: 6px;
            transition: var(--transition);
        }

        .cgroup-panel-close:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: none;
            box-shadow: none;
        }

        .cgroup-panel-body {
            padding: 25px;
        }

        .cgroup-inline-container {
            margin-top: 15px;
            padding: 15px;
            background: #f8faff;
            border: 1px solid #e0e6ed;
            border-radius: 8px;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .cgroup-section {
            margin-bottom: 25px;
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid var(--border);
        }

        .cgroup-section-title {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 15px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pressure-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .pressure-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .pressure-card h4 {
            margin: 0 0 10px 0;
            font-size: 0.9rem;
            color: var(--gray);
            text-transform: uppercase;
        }

        .pressure-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
        }

        .pressure-details {
            font-size: 0.8rem;
            color: var(--gray);
            margin-top: 8px;
        }

        .cgroup-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .parent-cgroup {
            padding: 12px 15px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: var(--transition);
        }

        .parent-cgroup:hover {
            background: var(--gray-light);
            border-color: var(--primary);
        }

        .parent-cgroup-path {
            font-family: 'Courier New', monospace;
            color: var(--primary);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .cgroup-path-clickable {
            cursor: pointer;
            text-decoration: underline dotted;
            color: var(--primary);
        }

        .cgroup-path-clickable:hover {
            color: var(--secondary);
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>Memory Monitor</h1>
            </div>
            <div style="display: flex; gap: 15px; align-items: center;">
                <button onclick="location.href='cgmon.html'"
                    style="padding: 8px 16px; font-size: 0.9rem; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); box-shadow: none;"
                    title="View CGroups">
                    📂 CGroups
                </button>
            </div>
            <div style="margin: 0 15px;">
                <select id="sort-select"
                    style="background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: 600;">
                    <option value="pss" style="color: #333" selected>Sort: PSS</option>
                    <option value="anon" style="color: #333">Sort: Anon</option>
                    <option value="rss" style="color: #333">Sort: RSS</option>
                    <option value="file" style="color: #333">Sort: File</option>
                    <option value="kernel" style="color: #333">Sort: Kernel</option>
                    <option value="swap" style="color: #333">Sort: Swap</option>
                    <option value="pagetables" style="color: #333">Sort: Page Tables</option>
                </select>
            </div>
            <div class="status-bar paused" id="status-bar" title="Click to toggle auto-refresh">
                <div class="status-item">
                    <span class="stat-label" style="color: white; margin-bottom: 0; margin-right: 8px;">Refreshing
                        in:</span>
                    <span id="refresh-timer" style="font-weight: 600;">5s</span>
                    <span id="paused-label" style="display: inline; font-weight: 600; margin-left: 8px;">(PAUSED)</span>
                    <button id="refresh-btn" title="Refresh Now"
                        style="margin-left: 15px; padding: 6px 12px; font-size: 1.2rem; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); box-shadow: none;">🔄</button>
                </div>
            </div>
        </header>


        <div class="dashboard">
            <div class="process-card">
                <div class="stats-bar">
                    <div class="stat-item">
                        <span class="stat-label">Total Processes</span>
                        <span class="stat-value" id="total-processes">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Total PSS</span>
                        <span class="stat-value" id="total-pss">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Total RSS</span>
                        <span class="stat-value" id="total-rss">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Total Anon</span>
                        <span class="stat-value" id="total-anon">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Total File</span>
                        <span class="stat-value" id="total-file">0</span>
                    </div>
                </div>
                <div class="card-body">
                    <input type="text" id="search-box" class="search-box" placeholder="Search processes...">
                    <div class="process-table-container">
                        <table id="process-table">
                            <colgroup>
                                <col style="width: 250px;">
                                <col style="width: 80px;">
                                <col style="width: 80px;">
                                <col>
                            </colgroup>
                            <thead>
                                <tr>
                                    <th>Memory (Anon / File / RSS)</th>
                                    <th class="pid-cell">PID</th>
                                    <th class="pid-cell">PPID</th>
                                    <th>Command</th>
                                </tr>
                            </thead>
                            <tbody id="process-table-body">
                                <tr>
                                    <td colspan="4" class="empty-state">
                                        <i>📊</i>
                                        <p>No process data available</p>
                                        <p>Refresh to load processes</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>PMOND Process Monitor | Real-time system monitoring</p>
        </footer>
    </div>

    </div>

    <script src="pmond.js"></script>
    <script>
        // DOM elements
        const processTableBody = document.getElementById('process-table-body');
        const totalProcessesElement = document.getElementById('total-processes');
        const statusBar = document.getElementById('status-bar');
        const pausedLabel = document.getElementById('paused-label');
        const refreshTimerEl = document.getElementById('refresh-timer');
        const refreshButton = document.getElementById('refresh-btn');
        const searchBox = document.getElementById('search-box');
        const sortSelect = document.getElementById('sort-select');

        // State
        let allProcesses = {};
        let refreshInterval = 5;
        let timeLeft = refreshInterval;
        let isPaused = true;

        statusBar.addEventListener('click', () => {
            isPaused = !isPaused;
            statusBar.classList.toggle('paused', isPaused);
            pausedLabel.style.display = isPaused ? 'inline' : 'none';
        });

        // Add log entry
        function addLogEntry(message, type = 'info') {
            const timestamp = new Date().toISOString();
            console.log(`[${timestamp}] ${type.toUpperCase()}: ${message}`);
        }

        // Move process to a new cgroup subdirectory
        function moveToCgroup(pid) {
            // No longer prompting for name, using default command-pid
            fetch('../_move_process', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    pid: parseInt(pid),
                    cgroup_name: null // Backend will use default
                }),
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'ok') {
                        addLogEntry(`Successfully moved process ${pid} to mesh.slice`, 'success');
                        refreshProcesses();
                    } else {
                        addLogEntry(`Failed to move process ${pid}: ${data.error}`, 'error');
                        alert('Error: ' + data.error);
                    }
                })
                .catch(error => {
                    addLogEntry(`Request failed for process ${pid}: ${error.message}`, 'error');
                    alert('Request failed: ' + error.message);
                });
        }

        // Clear process memory references (PSS, etc)
        function clearRefs(pid, value = '7') {
            fetch('../_clear_refs', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    pid: parseInt(pid),
                    value: value
                }),
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'ok') {
                        addLogEntry(`Successfully cleared refs for process ${pid}`, 'success');
                        refreshProcesses();
                    } else {
                        addLogEntry(`Failed to clear refs for process ${pid}: ${data.error}`, 'error');
                        alert('Error: ' + data.error);
                    }
                })
                .catch(error => {
                    addLogEntry(`Request failed for process ${pid}: ${error.message}`, 'error');
                    alert('Request failed: ' + error.message);
                });
        }

        async function showCgroupInfo(pid) {
            const container = document.getElementById(`cgroup-info-${pid}`);
            if (!container) return;

            // Toggle logic
            if (container.style.display !== 'none' && container.dataset.loaded === 'true') {
                container.style.display = 'none';
                container.dataset.loaded = 'false';
                container.innerHTML = '';
                return;
            }

            container.style.display = 'block';
            container.innerHTML = '<div style="text-align: center; padding: 10px; color: var(--gray);">Loading cgroup information...</div>';
            container.dataset.loaded = 'false';

            try {
                const response = await fetch(`../_process/${pid}`);
                if (!response.ok) throw new Error('Failed to fetch process info');
                const data = await response.json();

                renderCgroupInline(container, data);
                container.dataset.loaded = 'true';
            } catch (err) {
                container.innerHTML = `<div style="text-align: center; padding: 10px; color: var(--danger);">Error: ${err.message}</div>`;
            }
        }

        function formatPressure(pressure) {
            if (!pressure) return { avg10: '0.00', avg60: '0.00', avg300: '0.00', total: '0' };
            return {
                avg10: pressure.avg10?.toFixed(2) || '0.00',
                avg60: pressure.avg60?.toFixed(2) || '0.00',
                avg300: pressure.avg300?.toFixed(2) || '0.00',
                total: (pressure.total || 0).toLocaleString()
            };
        }

        function renderPressureCard(label, emoji, pressure) {
            const p = formatPressure(pressure);
            return `
                <div class="pressure-card">
                    <h4>${emoji} ${label}</h4>
                    <div class="pressure-value">${p.avg10}%</div>
                    <div class="pressure-details">
                        60s: ${p.avg60}% | 300s: ${p.avg300}%<br>
                        Total: ${p.total}µs
                    </div>
                </div>
            `;
        }

        function renderCgroupActions(cgroupPath) {
            const safePath = cgroupPath.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
            return `
                <div class="cgroup-actions">
                    <button class="action-btn" onclick="setCgroupHigh('${safePath}', 90, 5)" style="background: var(--success); color: white; border: none;">90% High (5s)</button>
                    <button class="action-btn" onclick="setCgroupHigh('${safePath}', 50, 5)" style="background: var(--warning); color: white; border: none;">50% High (5s)</button>
                    <button class="action-btn" onclick="customCgroupHigh('${safePath}')" style="background: var(--info); color: white; border: none;">Custom...</button>
                    <button class="action-btn" onclick="setCgroupHigh('${safePath}', -1, 0)" style="background: var(--danger); color: white; border: none;">Reset to Max</button>
                </div>
            `;
        }

        async function setCgroupHigh(path, percentage, interval) {
            try {
                const response = await fetch('../_cgroup_high', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path, percentage, interval })
                });
                if (response.ok) {
                    addLogEntry(`Set memory.high for ${path}`, 'success');
                    alert('Memory high limit updated!');
                } else {
                    const err = await response.json();
                    alert(`Error: ${err.error}`);
                }
            } catch (err) {
                alert(`Failed: ${err}`);
            }
        }

        function customCgroupHigh(path) {
            const percentage = prompt("Enter percentage (e.g. 90):", "90");
            if (percentage === null) return;
            const interval = prompt("Seconds before reset (0 = indefinite):", "5");
            if (interval === null) return;
            setCgroupHigh(path, parseFloat(percentage), parseInt(interval));
        }

        function renderCgroupSection(cgroup, isParent = false) {
            if (!cgroup) return '';

            const displayPath = cgroup.path.replace('/sys/fs/cgroup', '') || '/';
            const mem = cgroup.mem_info || {};

            return `
                <div class="cgroup-section ${isParent ? 'parent-cgroup' : ''}">
                    <div class="cgroup-section-title">
                        ${isParent ? '↳' : '📂'} ${displayPath}
                    </div>
                    
                    <div style="margin-bottom: 15px;">
                        <strong>Memory:</strong> 
                        Current: <span style="color: var(--primary); font-weight: 600;">${mem.memory_current ? formatMemory(mem.memory_current) : 'N/A'}</span> | 
                        Anon: ${formatMemory(mem.anon || 0)} | 
                        File: ${formatMemory(mem.file || 0)} | 
                        High: ${formatMemoryOrMax(mem.memory_high)}
                    </div>
                    
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 15px;">
                        <!-- Usage & Core -->
                        <div style="background: white; padding: 12px; border-radius: 8px; border: 1px solid var(--border);">
                            <div style="font-size: 0.8rem; font-weight: 700; text-transform: uppercase; color: var(--gray); margin-bottom: 10px; border-bottom: 1px solid var(--gray-light); padding-bottom: 4px;">
                                🏠 Usage & Core
                            </div>
                            <div style="font-size: 0.85rem; margin-bottom: 4px;"><span style="color: var(--gray);">Kernel (total):</span> <span style="font-family: monospace;">${formatMemory(mem.kernel || 0)}</span></div>
                            <div style="font-size: 0.85rem; margin-bottom: 4px;"><span style="color: var(--gray);">Kernel Stack:</span> <span style="font-family: monospace;">${formatMemory(mem.kernel_stack || 0)}</span></div>
                            <div style="font-size: 0.85rem; margin-bottom: 4px;"><span style="color: var(--gray);">Page Tables:</span> <span style="font-family: monospace;">${formatMemory(mem.pagetables || 0)}</span></div>
                            <div style="font-size: 0.85rem; margin-bottom: 4px;"><span style="color: var(--gray);">Shmem:</span> <span style="font-family: monospace;">${formatMemory(mem.shmem || 0)}</span></div>
                            <div style="font-size: 0.85rem; margin-bottom: 4px;"><span style="color: var(--gray);">File Mapped:</span> <span style="font-family: monospace;">${formatMemory(mem.file_mapped || 0)}</span></div>
                            <div style="font-size: 0.85rem; margin-bottom: 4px;"><span style="color: var(--gray);">File Dirty:</span> <span style="font-family: monospace;">${formatMemory(mem.file_dirty || 0)}</span></div>
                            <div style="font-size: 0.85rem; margin-bottom: 4px;"><span style="color: var(--gray);">File Writeback:</span> <span style="font-family: monospace;">${formatMemory(mem.file_writeback || 0)}</span></div>
                            <div style="font-size: 0.85rem; margin-bottom: 4px;"><span style="color: var(--gray);">Swap Cached:</span> <span style="font-family: monospace;">${formatMemory(mem.swapcached || 0)}</span></div>
                        </div>
                        
                        <!-- VM Events -->
                        <div style="background: white; padding: 12px; border-radius: 8px; border: 1px solid var(--border);">
                            <div style="font-size: 0.8rem; font-weight: 700; text-transform: uppercase; color: var(--gray); margin-bottom: 10px; border-bottom: 1px solid var(--gray-light); padding-bottom: 4px;">
                                ⚡ VM Events (Counts)
                            </div>
                            <div style="font-size: 0.85rem; margin-bottom: 4px;"><span style="color: var(--gray);">Page Faults:</span> <span style="font-family: monospace; color: var(--secondary);">${formatCount(mem.pgfault)}</span></div>
                            <div style="font-size: 0.85rem; margin-bottom: 4px;"><span style="color: var(--gray);">Major Faults:</span> <span style="font-family: monospace; color: var(--danger);">${formatCount(mem.pgmajfault)}</span></div>
                            <div style="font-size: 0.85rem; margin-bottom: 4px;"><span style="color: var(--gray);">Pg Refill:</span> <span style="font-family: monospace; color: var(--secondary);">${formatCount(mem.pgrefill)}</span></div>
                            <div style="font-size: 0.85rem; margin-bottom: 4px;"><span style="color: var(--gray);">Pg Activate:</span> <span style="font-family: monospace; color: var(--secondary);">${formatCount(mem.pgactivate)}</span></div>
                            <div style="font-size: 0.85rem; margin-bottom: 4px;"><span style="color: var(--gray);">Pg Deactivate:</span> <span style="font-family: monospace; color: var(--secondary);">${formatCount(mem.pgdeactivate)}</span></div>
                            <div style="font-size: 0.85rem; margin-bottom: 4px;"><span style="color: var(--gray);">Swap In/Out:</span> <span style="font-family: monospace; color: var(--secondary);">${formatCount(mem.pswpin)} / ${formatCount(mem.pswpout)}</span></div>
                            <div style="font-size: 0.85rem; margin-bottom: 4px;"><span style="color: var(--gray);">Steal / Scan:</span> <span style="font-family: monospace; color: var(--secondary);">${formatCount(mem.pgsteal)} / ${formatCount(mem.pgscan)}</span></div>
                        </div>
                        
                        <!-- Active/Inactive -->
                        <div style="background: white; padding: 12px; border-radius: 8px; border: 1px solid var(--border);">
                            <div style="font-size: 0.8rem; font-weight: 700; text-transform: uppercase; color: var(--gray); margin-bottom: 10px; border-bottom: 1px solid var(--gray-light); padding-bottom: 4px;">
                                🔄 Active / Inactive
                            </div>
                            <div style="font-size: 0.85rem; margin-bottom: 4px;"><span style="color: var(--gray);">Active Anon:</span> <span style="font-family: monospace;">${formatMemory(mem.active_anon || 0)}</span></div>
                            <div style="font-size: 0.85rem; margin-bottom: 4px;"><span style="color: var(--gray);">Inactive Anon:</span> <span style="font-family: monospace;">${formatMemory(mem.inactive_anon || 0)}</span></div>
                            <div style="font-size: 0.85rem; margin-bottom: 4px;"><span style="color: var(--gray);">Active File:</span> <span style="font-family: monospace;">${formatMemory(mem.active_file || 0)}</span></div>
                            <div style="font-size: 0.85rem; margin-bottom: 4px;"><span style="color: var(--gray);">Inactive File:</span> <span style="font-family: monospace;">${formatMemory(mem.inactive_file || 0)}</span></div>
                        </div>
                        
                        <!-- WorkingSet Stats -->
                        <div style="background: white; padding: 12px; border-radius: 8px; border: 1px solid var(--border);">
                            <div style="font-size: 0.8rem; font-weight: 700; text-transform: uppercase; color: var(--gray); margin-bottom: 10px; border-bottom: 1px solid var(--gray-light); padding-bottom: 4px;">
                                🧠 WorkingSet Stats
                            </div>
                            <div style="font-size: 0.85rem; margin-bottom: 4px;"><span style="color: var(--gray);">Refault A/F:</span> <span style="font-family: monospace; color: var(--secondary);">${formatCount(mem.workingset_refault_anon)} / ${formatCount(mem.workingset_refault_file)}</span></div>
                            <div style="font-size: 0.85rem; margin-bottom: 4px;"><span style="color: var(--gray);">Activate A/F:</span> <span style="font-family: monospace; color: var(--secondary);">${formatCount(mem.workingset_activate_anon)} / ${formatCount(mem.workingset_activate_file)}</span></div>
                            <div style="font-size: 0.85rem; margin-bottom: 4px;"><span style="color: var(--gray);">Restore A/F:</span> <span style="font-family: monospace; color: var(--secondary);">${formatCount(mem.workingset_restore_anon)} / ${formatCount(mem.workingset_restore_file)}</span></div>
                            <div style="font-size: 0.85rem; margin-bottom: 4px;"><span style="color: var(--gray);">Nodereclaim:</span> <span style="font-family: monospace; color: var(--secondary);">${formatCount(mem.workingset_nodereclaim)}</span></div>
                        </div>
                        
                        <!-- Demotions -->
                        <div style="background: white; padding: 12px; border-radius: 8px; border: 1px solid var(--border);">
                            <div style="font-size: 0.8rem; font-weight: 700; text-transform: uppercase; color: var(--gray); margin-bottom: 10px; border-bottom: 1px solid var(--gray-light); padding-bottom: 4px;">
                                📉 Demotions
                            </div>
                            <div style="font-size: 0.85rem; margin-bottom: 4px;"><span style="color: var(--gray);">Kswapd:</span> <span style="font-family: monospace; color: var(--secondary);">${formatCount(mem.pgdemote_kswapd)}</span></div>
                            <div style="font-size: 0.85rem; margin-bottom: 4px;"><span style="color: var(--gray);">Direct:</span> <span style="font-family: monospace; color: var(--secondary);">${formatCount(mem.pgdemote_direct)}</span></div>
                            <div style="font-size: 0.85rem; margin-bottom: 4px;"><span style="color: var(--gray);">Khugepaged:</span> <span style="font-family: monospace; color: var(--secondary);">${formatCount(mem.pgdemote_khugepaged)}</span></div>
                            <div style="font-size: 0.85rem; margin-bottom: 4px;"><span style="color: var(--gray);">Proactive:</span> <span style="font-family: monospace; color: var(--secondary);">${formatCount(mem.pgdemote_proactive)}</span></div>
                        </div>
                    </div>
                    
                    <div class="pressure-grid">
                        ${renderPressureCard('Memory', '💾', cgroup.memory_pressure)}
                        ${renderPressureCard('IO', '💿', cgroup.io_pressure)}
                        ${renderPressureCard('CPU', '⚡', cgroup.cpu_pressure)}
                    </div>
                    
                    ${cgroup.pids && cgroup.pids.length > 0 ? `
                        <div style="margin-top: 15px; font-size: 0.85rem; color: var(--gray);">
                            <strong>PIDs in cgroup:</strong> ${cgroup.pids.slice(0, 20).join(', ')}${cgroup.pids.length > 20 ? ` ... (+${cgroup.pids.length - 20} more)` : ''}
                        </div>
                    ` : ''}
                    
                    ${!isParent ? renderCgroupActions(cgroup.path) : ''}
                </div>
            `;
        }

        function renderCgroupInline(container, data) {
            const process = data.process;

            let html = `
                <div class="cgroup-inline-container">
                    <div style="font-size: 0.9rem; font-weight: 600; color: var(--dark); margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px;">
                        Detailed CGroup Information
                    </div>
            `;

            if (data.cgroup) {
                html += renderCgroupSection(data.cgroup);
            } else {
                html += '<div style="padding: 10px; text-align: center; color: var(--gray);">No direct cgroup information available</div>';
            }

            if (data.parent_cgroups && data.parent_cgroups.length > 0) {
                html += '<div style="margin: 15px 0 10px 0; font-weight: 600; font-size: 0.9rem; color: var(--gray);">Parent Hierarchy</div>';
                for (const parent of data.parent_cgroups) {
                    html += renderCgroupSection(parent, true);
                }
            }

            html += '</div>';
            container.innerHTML = html;
        }

        // Update process list
        function updateProcessList(processes) {
            allProcesses = processes;
            const searchTerm = searchBox.value.toLowerCase();
            let filteredProcesses = {};

            if (searchTerm) {
                for (const pid in processes) {
                    const process = processes[pid];
                    if (process.comm.toLowerCase().includes(searchTerm) ||
                        (process.cmdline && process.cmdline.toLowerCase().includes(searchTerm)) ||
                        (process.cgroup_path && process.cgroup_path.toLowerCase().includes(searchTerm)) ||
                        pid.includes(searchTerm) ||
                        process.ppid.toString().includes(searchTerm)) {
                        filteredProcesses[pid] = process;
                    }
                }
            } else {
                filteredProcesses = processes;
            }

            const sortKey = sortSelect.value;
            let sortedProcesses = Object.entries(filteredProcesses)
                .sort(([pid1, proc1], [pid2, proc2]) => {
                    const getVal = (proc) => {
                        const m = proc.mem_info || {};
                        switch (sortKey) {
                            case 'pss': return m.pss || 0;
                            case 'anon': return m.anon || 0;
                            case 'rss': return m.rss || 0;
                            case 'file': return m.file || 0;
                            case 'kernel': return m.kernel || 0;
                            case 'swap': return m.swap || 0;
                            case 'pagetables': return m.pagetables || 0;
                            default: return m.pss || 0;
                        }
                    };
                    const val1 = getVal(proc1);
                    const val2 = getVal(proc2);
                    return val2 - val1;
                });

            const sortedProcessArray = sortedProcesses.map(([pid, process]) => ({ pid, process }));
            totalProcessesElement.textContent = Object.keys(processes).length;

            let totalPss = 0;
            let totalRss = 0;
            let totalAnon = 0;
            let totalFile = 0;
            for (const pid in processes) {
                const process = processes[pid];
                if (process.mem_info) {
                    totalPss += process.mem_info.pss || 0;
                    totalRss += process.mem_info.rss || 0;
                    totalAnon += process.mem_info.anon || 0;
                    totalFile += process.mem_info.file || 0;
                }
            }

            document.getElementById('total-pss').textContent = formatMemory(totalPss);
            document.getElementById('total-rss').textContent = formatMemory(totalRss);
            document.getElementById('total-anon').textContent = formatMemory(totalAnon);
            document.getElementById('total-file').textContent = formatMemory(totalFile);

            processTableBody.innerHTML = '';

            if (sortedProcessArray.length === 0) {
                processTableBody.innerHTML = `
                      <tr>
                          <td colspan="6" class="empty-state">
                              <i>🔍</i>
                              <p>No processes match your search</p>
                          </td>
                      </tr>
                  `;
                return;
            }

            for (const { pid, process } of sortedProcessArray) {
                const mainRow = document.createElement('tr');
                mainRow.className = 'process-main';
                mainRow.innerHTML = `
                       <td class="mem-cell">
                           <span style="color: var(--primary); font-weight: bold;">${process.mem_info ? formatMemory(process.mem_info.anon) : 'N/A'}</span>
                           <span style="font-size: 0.85em; color: var(--gray);"> / ${process.mem_info ? formatMemory(process.mem_info.file) : 'N/A'}</span>
                           <span style="font-size: 0.85em; color: #666;"> / ${process.mem_info ? formatMemory(process.mem_info.rss) : 'N/A'}</span>
                       </td>
                       <td class="pid-cell">${process.pid}</td>
                       <td class="pid-cell">${process.ppid}</td>
                       <td class="comm-cell">${process.comm}</td>
                   `;

                const memoryRow = document.createElement('tr');
                memoryRow.className = 'process-memory';

                const renderItem = (label, val, style = "") => {
                    if (!val || val === "0" || val === 0 || val === "N/A") return "";
                    let displayVal = typeof val === 'number' ? formatMemory(val) : val;
                    return `<div class="memory-item" style="${style}"><span class="memory-label">${label}:</span><span class="memory-value">${displayVal}</span></div>`;
                };

                const formatDelta = (value) => {
                    if (!value || value === 0) return '';
                    const formatted = typeof value === 'number' ? formatMemory(Math.abs(value)) : value;
                    const sign = value > 0 ? '+' : '-';
                    const color = value > 0 ? '#ff4d4d' : '#2ecc71';
                    return `<span style="color: ${color}; font-size: 0.85em; margin-left: 5px; font-weight: 600;">(${sign}${formatted})</span>`;
                };

                const formatDeltaSimple = (value) => {
                    if (!value || value === 0) return '';
                    const sign = value > 0 ? '+' : '';
                    const color = value > 0 ? '#ff4d4d' : '#2ecc71';
                    return `<span style="color: ${color}; font-size: 0.85em; margin-left: 5px; font-weight: 600;">(${sign}${value})</span>`;
                };

                const m = process.mem_info || {};
                memoryRow.innerHTML = `
                       <td colspan="4">
                           <div class="memory-details" style="grid-template-columns: repeat(4, 1fr); padding: 15px; background: #fdfdfd; border: 1px solid #eee; border-radius: 8px; margin: 5px 20px 15px 20px;">
                               <div class="memory-item"><span class="memory-label">PSS:</span><span class="memory-value" style="color: var(--primary); font-weight: bold;">${formatMemory(m.pss || 0)}</span></div>
                               <div class="memory-item"><span class="memory-label">RSS:</span><span class="memory-value">${formatMemory(m.rss || 0)}</span></div>
                               <div class="memory-item"><span class="memory-label">Anon:</span><span class="memory-value">${formatMemory(m.anon || 0)}${formatDelta(m.d_anon)}</span></div>
                               <div class="memory-item"><span class="memory-label">File:</span><span class="memory-value">${formatMemory(m.file || 0)}${formatDelta(m.d_file)}</span></div>
                               
                               <div class="memory-item"><span class="memory-label">Referenced:</span><span class="memory-value" style="color: var(--success); font-weight: 600;">${formatMemory(m.referenced || 0)}</span></div>
                               <div class="memory-item"><span class="memory-label">Shared:</span><span class="memory-value">${formatMemory(m.shmem || 0)}${formatDelta(m.d_shmem)}</span></div>
                               <div class="memory-item"><span class="memory-label">PTE Tables:</span><span class="memory-value">${formatMemory(m.pagetables || 0)}${formatDelta(m.d_pagetables)}</span></div>
                               <div class="memory-item"><span class="memory-label">Kernel Stk:</span><span class="memory-value">${formatMemory(m.kernel_stack || 0)}${formatDelta(m.d_kernel_stack)}</span></div>
                               
                               ${renderItem("Priv Dirty", m.private_dirty)}
                               ${renderItem("Priv Clean", m.private_clean)}
                               ${renderItem("Shr Dirty", m.shared_dirty)}
                               ${renderItem("Shr Clean", m.shared_clean)}
                               
                               ${renderItem("Swap", m.swap, "color: var(--danger);")}
                               ${renderItem("HugeTLB", m.hugetlb)}
                               <div class="memory-item"><span class="memory-label">Faults:</span><span class="memory-value">${(m.pgfault || 0) - (m.pgmajfault || 0)} / ${m.pgmajfault || 0}${formatDeltaSimple(m.d_pgfault)} ${m.d_pgmajfault ? "[maj: " + formatDeltaSimple(m.d_pgmajfault) + "]" : ""}</span></div>
                               
                               <!-- Extra CGroup fields -->
                               ${renderItem("Active Anon", m.active_anon)}
                               ${renderItem("Inactive Anon", m.inactive_anon)}
                               ${renderItem("Active File", m.active_file)}
                               ${renderItem("Inactive File", m.inactive_file)}
                               
                               ${renderItem("Kernel", m.kernel)}
                               ${renderItem("File Mapped", m.file_mapped)}
                               ${renderItem("File Dirty", m.file_dirty)}
                               ${renderItem("File WB", m.file_writeback)}
                               
                               ${renderItem("Refault Anon", m.workingset_refault_anon)}
                               ${renderItem("Refault File", m.workingset_refault_file)}
                               ${renderItem("Current", m.memory_current)}
                               ${renderItem("Limit", m.memory_high)}

                               <div class="memory-item" style="grid-column: 1 / -1; margin-top: 8px; padding-top: 8px; border-top: 1px dashed #eee;">
                                   <span class="memory-label" style="display: block; margin-bottom: 4px;">Command Line:</span>
                                   <div class="memory-value" style="word-break: break-all; white-space: normal; font-size: 0.9em; background: #f8f9fa; padding: 6px; border-radius: 4px;">${process.cmdline || 'N/A'}</div>
                               </div>
                               
                               <div class="memory-item" style="grid-column: 1 / -1; display: flex; align-items: center; border-top: 1px solid var(--border); padding-top: 8px; margin-top: 8px;">
                                   <span class="memory-label">Cgroup:</span>
                                   <span class="memory-value cgroup-path-clickable" style="flex: 1; margin-right: 10px; font-size: 0.85em;" onclick="showCgroupInfo(${process.pid})">${process.cgroup_path || '/'}</span>
                                   <div style="display: flex; gap: 5px;">
                                       <button onclick="clearRefs(${process.pid})" class="warning" style="padding: 4px 8px; font-size: 11px; height: auto;">
                                           Clear PSS
                                        </button>
                                       <button onclick="moveToCgroup(${process.pid})" class="secondary" style="padding: 4px 8px; font-size: 11px; height: auto;">
                                           Move
                                       </button>
                                   </div>
                               </div>

                                <!-- Inline details target -->
                                <div id="cgroup-info-${process.pid}" style="display: none; grid-column: 1 / -1;" data-loaded="false"></div>
                            </div>
                        </td>
                    `;

                processTableBody.appendChild(mainRow);
                processTableBody.appendChild(memoryRow);
            }
        }

        // Refresh processes via REST API
        function refreshProcesses() {
            fetch('../_ps')
                .then(response => response.json())
                .then(data => {
                    updateProcessList(data);
                    addLogEntry(`Refreshed process list with ${Object.keys(data).length} processes`, 'success');
                    timeLeft = refreshInterval;
                })
                .catch(error => {
                    addLogEntry(`Failed to refresh processes: ${error.message}`, 'error');
                });
        }


        // Search handler
        function handleSearch() {
            updateProcessList(allProcesses);
        }

        // Event listeners
        refreshButton.addEventListener('click', refreshProcesses);
        refreshButton.addEventListener('click', refreshProcesses);
        searchBox.addEventListener('input', handleSearch);
        sortSelect.addEventListener('change', () => { updateProcessList(allProcesses); });

        // Add keyboard shortcut for refresh
        document.addEventListener('keydown', (event) => {
            if ((event.key === 'r' || event.key === 'R') &&
                event.target.tagName !== 'INPUT' &&
                event.target.tagName !== 'TEXTAREA') {
                refreshProcesses();
            }
        });

        setInterval(() => {
            if (isPaused) return;
            timeLeft--;
            if (timeLeft <= 0) {
                refreshProcesses();
            }
            refreshTimerEl.textContent = timeLeft + 's';
        }, 1000);

        // Initial refresh
        const urlParams = new URLSearchParams(window.location.search);
        const searchParam = urlParams.get('search');
        if (searchParam) {
            searchBox.value = searchParam;
        }
        refreshProcesses();

        setTimeout(() => {
            addLogEntry('PMOND web interface loaded successfully', 'success');
            addLogEntry('Ready to monitor system processes', 'info');
        }, 1000);
    </script>
</body>

</html>
