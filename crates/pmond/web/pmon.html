<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --success: #4cc9f0;
            --danger: #f72585;
            --warning: #f8961e;
            --info: #4895ef;
            --light: #f8f9fa;
            --dark: #212529;
            --gray: #6c757d;
            --gray-light: #f1f3f5;
            --border: #e9ecef;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #f8f9fa;
            color: var(--dark);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            width: 100%;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            margin: 0;
            padding: 0;
            max-width: 100%;
            box-sizing: border-box;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            margin-bottom: 25px;
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
        }

        .process-card,
        .log-card {
            background: white;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
        }

        .card-body {
            padding: 0;
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
        }

        .process-table-container {
            flex: 1;
            overflow-y: auto;
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
        }

        #process-table {
            width: 100%;
            table-layout: fixed;
            min-width: 100%;
            box-sizing: border-box;
        }

        #process-table col {
            width: 16.666%;
        }

        header {
            background: var(--dark);
            color: white;
            padding: 12px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-content h1 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .divider {
            width: 1px;
            height: 24px;
            background: rgba(255, 255, 255, 0.15);
            margin: 0 8px;
        }


        .status-bar {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: var(--transition);
            user-select: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-bar:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .status-bar.paused {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .connected {
            background-color: #28a745;
        }

        .disconnected {
            background-color: #dc3545;
        }

        .process-count {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        button {
            background: white;
            color: var(--dark);
            border: 1px solid var(--border);
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: var(--transition);
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background-color: var(--light);
            border-color: var(--gray);
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        button:active {
            transform: translateY(0);
        }

        button.primary {
            background: var(--primary);
            color: white;
            border: none;
        }

        button.primary:hover {
            background: var(--secondary);
        }

        button.header-btn {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            padding: 8px 14px;
            font-size: 13px;
        }

        button.header-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-1px);
        }

        button.secondary {
            background: white;
            color: var(--info);
            border-color: var(--info);
        }

        button.secondary:hover {
            background: var(--info);
            color: white;
        }

        button.warning {
            background: white;
            color: var(--warning);
            border-color: var(--warning);
        }

        button.warning:hover {
            background: var(--warning);
            color: white;
        }

        button:disabled {
            background: var(--gray-light);
            color: var(--gray);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }


        .card-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 18px 25px;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .card-body {
            padding: 0;
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .process-table-container {
            flex: 1;
            overflow-y: auto;
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
        }

        #process-table {
            width: 100%;
            table-layout: fixed;
            min-width: 100%;
        }

        #process-table th,
        #process-table td {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Ensure columns are distributed properly */
        #process-table col:nth-child(1) {
            width: 6%;
        }

        #process-table col:nth-child(2) {
            width: 6%;
        }

        #process-table col:nth-child(3) {
            width: 12%;
        }

        #process-table col:nth-child(4) {
            width: 12%;
        }

        #process-table col:nth-child(5) {
            width: 64%;
        }

        /* For responsive design */
        @media (max-width: 768px) {
            #process-table col:nth-child(1) {
                width: 15%;
            }

            #process-table col:nth-child(2) {
                width: 15%;
            }

            #process-table col:nth-child(3) {
                width: 20%;
            }

            #process-table col:nth-child(4) {
                width: 25%;
            }

            #process-table col:nth-child(5) {
                width: 15%;
            }
        }

        th {
            background-color: #fcfcfc;
            color: var(--gray);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-align: left;
            padding: 18px 25px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 73px;
            /* height of header */
            z-index: 10;
        }

        td {
            padding: 14px 25px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        tr:hover {
            background-color: rgba(67, 97, 238, 0.05);
        }

        tr:nth-child(even) {
            background-color: rgba(0, 0, 0, 0.02);
        }

        .process-row {
            border-bottom: 2px solid var(--border);
        }

        .process-main {
            font-weight: 500;
        }

        .process-memory {
            font-size: 0.85rem;
            color: var(--gray);
            padding-top: 0;
        }

        .memory-details {
            display: flex;
            flex-wrap: wrap;
            gap: 0;
            padding: 20px;
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 12px;
            margin: 5px 20px 20px 20px;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.05);
        }

        .memory-grid {
            display: flex;
            gap: 0;
            width: 100%;
            margin-bottom: 20px;
        }

        .memory-column {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 0 20px;
            border-right: 1px solid #f0f0f0;
        }

        .memory-column:last-child {
            border-right: none;
        }

        .memory-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .memory-label {
            font-weight: 600;
            color: var(--gray);
            min-width: 80px;
        }

        .memory-value {
            font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
            font-weight: 500;
            color: var(--dark);
        }

        .pid-cell {
            font-weight: 600;
            color: var(--primary);
            width: 8ch;
            max-width: 8ch;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .comm-cell {
            font-weight: 500;
        }

        .cmdline-cell {
            font-size: 0.85rem;
            color: var(--gray);
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .log-content {
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            background-color: #2c3e50;
            color: #ecf0f1;
        }

        .log-entry {
            margin-bottom: 8px;
            padding: 8px;
            border-radius: 4px;
            background-color: rgba(255, 255, 255, 0.05);
        }

        .log-timestamp {
            color: #95a5a6;
            font-weight: 600;
        }

        .log-error {
            color: #e74c3c;
        }

        .log-info {
            color: #3498db;
        }

        .log-success {
            color: #2ecc71;
        }

        .log-warning {
            color: #f39c12;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--gray);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        .search-box {
            padding: 12px 20px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            width: 100%;
            margin-bottom: 20px;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.2);
        }

        .stats-bar {
            display: flex;
            gap: 24px;
            padding: 20px 30px;
            background-color: white;
            border-bottom: 1px solid var(--border);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--gray);
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
        }

        footer {
            text-align: center;
            padding: 20px;
            color: var(--gray);
            font-size: 0.9rem;
            margin-top: 20px;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            header {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }

            .status-bar {
                width: 100%;
                justify-content: center;
            }

            .controls {
                flex-direction: column;
            }

            button {
                width: 100%;
                justify-content: center;
            }

            th,
            td {
                padding: 10px 12px;
            }

            .cmdline-cell,
            .cgroup-cell {
                max-width: 150px;
            }
        }

        /* CGroup Panel Modal */
        .cgroup-panel-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .cgroup-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            z-index: 1001;
        }

        .cgroup-panel-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .cgroup-panel-header h2 {
            margin: 0;
            font-size: 1.3rem;
        }

        .cgroup-panel-close {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px 12px;
            border-radius: 6px;
            transition: var(--transition);
        }

        .cgroup-panel-close:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: none;
            box-shadow: none;
        }

        .cgroup-panel-body {
            padding: 25px;
        }

        .details-footer {
            width: 100%;
            border-top: 1px solid #f0f0f0;
            padding-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .footer-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .footer-label {
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.025em;
            color: var(--gray);
            min-width: 80px;
            padding-top: 4px;
        }

        .footer-value {
            flex: 1;
            font-size: 0.9rem;
            color: var(--dark);
            line-height: 1.5;
        }

        .cmdline-box {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 10px 14px;
            font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
            word-break: break-all;
            white-space: normal;
        }

        .cgroup-box {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 4px 0;
        }

        .cgroup-inline-container {
            margin-top: 15px;
            padding: 15px;
            background: #f8faff;
            border: 1px solid #e0e6ed;
            border-radius: 8px;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .cgroup-section {
            margin-bottom: 25px;
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid var(--border);
        }

        .cgroup-section-title {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 15px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pressure-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .pressure-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .pressure-card h4 {
            margin: 0 0 10px 0;
            font-size: 0.9rem;
            color: var(--gray);
            text-transform: uppercase;
        }

        .pressure-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
        }

        .pressure-details {
            font-size: 0.8rem;
            color: var(--gray);
            margin-top: 8px;
        }

        .cgroup-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .parent-cgroup {
            padding: 12px 15px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: var(--transition);
        }

        .parent-cgroup:hover {
            background: var(--gray-light);
            border-color: var(--primary);
        }

        .parent-cgroup-path {
            font-family: 'Courier New', monospace;
            color: var(--primary);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .cgroup-path-clickable {
            cursor: pointer;
            text-decoration: underline dotted;
            color: var(--primary);
        }

        .cgroup-path-clickable:hover {
            color: var(--secondary);
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="header-left">
                <div class="header-content">
                    <h1>Memory Monitor</h1>
                </div>
                <div class="divider"></div>
                <button onclick="location.href='cgmon.html'" class="header-btn" title="View CGroups">
                    📂 CGroups
                </button>
            </div>

            <div class="header-right">
                <select id="sort-select"
                    style="background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 6px 10px; border-radius: 6px; cursor: pointer; font-weight: 500; font-size: 13px;">
                    <option value="pss" style="color: #333" selected>Sort: PSS</option>
                    <option value="anon" style="color: #333">Sort: Anon</option>
                    <option value="rss" style="color: #333">Sort: RSS</option>
                    <option value="file" style="color: #333">Sort: File</option>
                    <option value="kernel" style="color: #333">Sort: Kernel</option>
                    <option value="swap" style="color: #333">Sort: Swap</option>
                    <option value="pagetables" style="color: #333">Sort: Page Tables</option>
                </select>

                <div class="divider"></div>

                <button id="refresh-btn" class="header-btn" title="Refresh Now (R)">R</button>
                <button id="mark-btn" class="header-btn" title="Mark Current State (M)">M</button>

                <div class="status-bar paused" id="status-bar" title="Click to toggle auto-refresh">
                    <span
                        style="color: rgba(255,255,255,0.7); margin-right: 8px; font-size: 12px; font-weight: 500;">Refreshing
                        in:</span>
                    <span id="refresh-timer" style="font-weight: 600; font-size: 13px; min-width: 24px;">5s</span>
                    <span id="paused-label"
                        style="display: inline; font-weight: 600; margin-left: 8px; font-size: 12px; color: #ff4d4d;">(PAUSED)</span>
                </div>
            </div>
        </header>


        <div class="dashboard">
            <div class="process-card">
                <div class="stats-bar">
                    <div class="stat-item">
                        <span class="stat-label">Total Processes</span>
                        <span class="stat-value" id="total-processes">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Total PSS</span>
                        <span class="stat-value" id="total-pss">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Total RSS</span>
                        <span class="stat-value" id="total-rss">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Total Anon</span>
                        <span class="stat-value" id="total-anon">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Total File</span>
                        <span class="stat-value" id="total-file">0</span>
                    </div>
                </div>
                <div class="card-body">
                    <input type="text" id="search-box" class="search-box" placeholder="Search processes...">
                    <div class="process-table-container">
                        <table id="process-table">
                            <tbody id="process-table-body">
                                <tr>
                                    <td colspan="4" class="empty-state">
                                        <i>📊</i>
                                        <p>No process data available</p>
                                        <p>Refresh to load processes</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>PMOND Process Monitor | Real-time system monitoring</p>
        </footer>
    </div>

    </div>

    <script src="pmond.js"></script>
    <script>
        // DOM elements
        const processTableBody = document.getElementById('process-table-body');
        const totalProcessesElement = document.getElementById('total-processes');
        const statusBar = document.getElementById('status-bar');
        const pausedLabel = document.getElementById('paused-label');
        const refreshTimerEl = document.getElementById('refresh-timer');
        const refreshButton = document.getElementById('refresh-btn');
        const searchBox = document.getElementById('search-box');
        const sortSelect = document.getElementById('sort-select');

        // State
        let allProcesses = {};
        let refreshInterval = 5;
        let timeLeft = refreshInterval;
        let isPaused = true;
        let markState = null; // Store snapshot for delta calculation

        statusBar.addEventListener('click', () => {
            isPaused = !isPaused;
            statusBar.classList.toggle('paused', isPaused);
            pausedLabel.style.display = isPaused ? 'inline' : 'none';
        });

        // Add log entry
        function addLogEntry(message, type = 'info') {
            const timestamp = new Date().toISOString();
            console.log(`[${timestamp}] ${type.toUpperCase()}: ${message}`);
        }

        // Move process to a new cgroup subdirectory
        function moveToCgroup(pid) {
            // No longer prompting for name, using default command-pid
            fetch('../_move_process', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    pid: parseInt(pid),
                    cgroup_name: null // Backend will use default
                }),
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'ok') {
                        addLogEntry(`Successfully moved process ${pid} to mesh.slice`, 'success');
                        refreshProcesses();
                    } else {
                        addLogEntry(`Failed to move process ${pid}: ${data.error}`, 'error');
                        alert('Error: ' + data.error);
                    }
                })
                .catch(error => {
                    addLogEntry(`Request failed for process ${pid}: ${error.message}`, 'error');
                    alert('Request failed: ' + error.message);
                });
        }

        // Clear process memory references (PSS, etc)
        function clearRefs(pid, value = '7') {
            fetch('../_clear_refs', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    pid: parseInt(pid),
                    value: value
                }),
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'ok') {
                        addLogEntry(`Successfully cleared refs for process ${pid}`, 'success');
                        refreshProcesses();
                    } else {
                        addLogEntry(`Failed to clear refs for process ${pid}: ${data.error}`, 'error');
                        alert('Error: ' + data.error);
                    }
                })
                .catch(error => {
                    addLogEntry(`Request failed for process ${pid}: ${error.message}`, 'error');
                    alert('Request failed: ' + error.message);
                });
        }

        function markCurrentState() {
            if (!allProcesses) {
                addLogEntry('No processes to mark', 'warning');
                return;
            }

            // Create a PID -> Process map for quick lookup
            markState = {};
            const procArray = Array.isArray(allProcesses) ? allProcesses : Object.values(allProcesses);

            procArray.forEach(p => {
                if (p && p.pid) {
                    // Deep copy the process object
                    markState[p.pid] = JSON.parse(JSON.stringify(p));
                }
            });

            addLogEntry(`Marked ${Object.keys(markState).length} processes. Deltas will be relative to this snapshot.`, 'info');
            refreshProcesses();
        }

        async function showCgroupInfo(pid, cgroupPath) {
            const container = document.getElementById(`cgroup-info-${pid}`);
            if (!container) return;

            // Toggle logic
            if (container.style.display !== 'none' && container.dataset.loaded === 'true') {
                container.style.display = 'none';
                container.dataset.loaded = 'false';
                container.innerHTML = '';
                return;
            }

            container.style.display = 'block';
            container.innerHTML = '<div style="text-align: center; padding: 10px; color: var(--gray);">Loading cgroup information...</div>';
            container.dataset.loaded = 'false';

            try {
                // Fetch only the direct cgroup info
                const response = await fetch(`../_cg?path=${encodeURIComponent(cgroupPath)}`);
                if (!response.ok) throw new Error('Failed to fetch cgroup info');
                const cgroupData = await response.json();

                renderCgroupInline(container, cgroupData);
                container.dataset.loaded = 'true';
            } catch (err) {
                container.innerHTML = `<div style="text-align: center; padding: 10px; color: var(--danger);">Error: ${err.message}</div>`;
            }
        }

        function formatPressure(pressure) {
            if (!pressure) return { avg10: '0.00', avg60: '0.00', avg300: '0.00', total: '0' };
            return {
                avg10: pressure.avg10?.toFixed(2) || '0.00',
                avg60: pressure.avg60?.toFixed(2) || '0.00',
                avg300: pressure.avg300?.toFixed(2) || '0.00',
                total: (pressure.total || 0).toLocaleString()
            };
        }

        function renderPressureCard(label, emoji, pressure) {
            const p = formatPressure(pressure);
            return `
                <div class="pressure-card">
                    <h4>${emoji} ${label}</h4>
                    <div class="pressure-value">${p.avg10}%</div>
                    <div class="pressure-details">

                        Total: ${p.total}µs
                    </div>
                </div>
            `;

            const safePath = cgroupPath.replace(/\\/g, '\\\\').replace(/'/g, "\\'");

        async function setCgroupHigh(path, percentage, interval) {
            try {
                const response = await fetch('../_cgroup_high', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path, percentage, interval })
                });
                if (response.ok) {
                    addLogEntry(`Set memory.high for ${path}`, 'success');
                    alert('Memory high limit updated!');
                } else {
                    const err = await response.json();
                    alert(`Error: ${err.error}`);
                }
            } catch (err) {
                alert(`Failed: ${err}`);
            }
        }

        function customCgroupHigh(path) {
            const percentage = prompt("Enter percentage (e.g. 90):", "90");
            if (percentage === null) return;
            const interval = prompt("Seconds before reset (0 = indefinite):", "5");
            if (interval === null) return;
            setCgroupHigh(path, parseFloat(percentage), parseInt(interval));
        }

        // Update process list
        function updateProcessList(processes) {
            allProcesses = processes;

            // Calculate deltas if markState exists
            if (markState) {
                const procArray = Array.isArray(processes) ? processes : Object.values(processes);
                procArray.forEach(proc => {
                    const markProc = markState[proc.pid];
                    if (proc.mem_info && markProc && markProc.mem_info) {
                        const m = proc.mem_info;
                        const mm = markProc.mem_info;

                        // Calculate delta for all numeric properties
                        for (const key in m) {
                            if (typeof m[key] === 'number' && !key.startsWith('d_')) {
                                const val = m[key] || 0;
                                const markVal = mm[key] || 0;
                                m['d_' + key] = val - markVal;
                            }
                        }
                    }
                });
            }

            const searchTerm = searchBox.value.toLowerCase();
            let filteredProcesses = {};

            if (searchTerm) {
                for (const pid in processes) {
                    const process = processes[pid];
                    if (process.comm.toLowerCase().includes(searchTerm) ||
                        (process.cmdline && process.cmdline.toLowerCase().includes(searchTerm)) ||
                        (process.cgroup_path && process.cgroup_path.toLowerCase().includes(searchTerm)) ||
                        pid.includes(searchTerm) ||
                        process.ppid.toString().includes(searchTerm)) {
                        filteredProcesses[pid] = process;
                    }
                }
            } else {
                filteredProcesses = processes;
            }

            const sortKey = sortSelect.value;
            let sortedProcesses = Object.entries(filteredProcesses)
                .sort(([pid1, proc1], [pid2, proc2]) => {
                    const getVal = (proc) => {
                        const m = proc.mem_info || {};
                        switch (sortKey) {
                            case 'pss': return m.pss || 0;
                            case 'anon': return m.anon || 0;
                            case 'rss': return m.rss || 0;
                            case 'file': return m.file || 0;
                            case 'kernel': return m.kernel || 0;
                            case 'swap': return m.swap || 0;
                            case 'pagetables': return m.pagetables || 0;
                            default: return m.pss || 0;
                        }
                    };
                    const val1 = getVal(proc1);
                    const val2 = getVal(proc2);
                    return val2 - val1;
                });

            const sortedProcessArray = sortedProcesses.map(([pid, process]) => ({ pid, process }));
            totalProcessesElement.textContent = Object.keys(processes).length;

            let totalPss = 0, totalRss = 0, totalAnon = 0, totalFile = 0;
            let deltaPss = 0, deltaRss = 0, deltaAnon = 0, deltaFile = 0;

            for (const pid in processes) {
                const p = processes[pid];
                if (p.mem_info) {
                    totalPss += p.mem_info.pss || 0;
                    totalRss += p.mem_info.rss || 0;
                    totalAnon += p.mem_info.anon || 0;
                    totalFile += p.mem_info.file || 0;

                    if (markState && markState[pid] && markState[pid].mem_info) {
                        deltaPss += (p.mem_info.pss || 0) - (markState[pid].mem_info.pss || 0);
                        deltaRss += (p.mem_info.rss || 0) - (markState[pid].mem_info.rss || 0);
                        deltaAnon += (p.mem_info.anon || 0) - (markState[pid].mem_info.anon || 0);
                        deltaFile += (p.mem_info.file || 0) - (markState[pid].mem_info.file || 0);
                    } else if (markState) {
                        // New process since mark - everything is delta? 
                        // Actually better to just sum existing deltas or compare total of all procs vs total of all marked procs.
                    }
                }
            }

            if (markState) {
                let markedTotalPss = 0, markedTotalRss = 0, markedTotalAnon = 0, markedTotalFile = 0;
                for (const pid in markState) {
                    const p = markState[pid];
                    if (p.mem_info) {
                        markedTotalPss += p.mem_info.pss || 0;
                        markedTotalRss += p.mem_info.rss || 0;
                        markedTotalAnon += p.mem_info.anon || 0;
                        markedTotalFile += p.mem_info.file || 0;
                    }
                }
                deltaPss = totalPss - markedTotalPss;
                deltaRss = totalRss - markedTotalRss;
                deltaAnon = totalAnon - markedTotalAnon;
                deltaFile = totalFile - markedTotalFile;
            }

            const renderStat = (id, val, delta) => {
                const el = document.getElementById(id);
                if (!el) return;
                let html = formatMemory(val);
                if (markState && delta !== 0) {
                    const color = delta > 0 ? '#ff4d4d' : '#2ecc71';
                    const sign = delta > 0 ? '+' : '';
                    html += ` <span style="font-size: 0.75em; color: ${color}; font-weight: 600;">(${sign}${formatMemory(delta)})</span>`;
                }
                el.innerHTML = html;
            };

            renderStat('total-pss', totalPss, deltaPss);
            renderStat('total-rss', totalRss, deltaRss);
            renderStat('total-anon', totalAnon, deltaAnon);
            renderStat('total-file', totalFile, deltaFile);

            processTableBody.innerHTML = '';

            if (sortedProcessArray.length === 0) {
                processTableBody.innerHTML = `
                      <tr>
                          <td colspan="6" class="empty-state">
                              <i>🔍</i>
                              <p>No processes match your search</p>
                          </td>
                      </tr>
                  `;
                return;
            }

            for (const { pid, process } of sortedProcessArray) {
                const memoryRow = document.createElement('tr');
                memoryRow.className = 'process-memory';
                memoryRow.style.borderBottom = '1px solid var(--border)';

                const renderItem = (label, val, delta, style = "", isCount = false) => {
                    // Always render, even if 0 or N/A
                    let displayVal = (val === undefined || val === null) ? 'N/A' : (isCount ? (val.toLocaleString()) : formatMemory(val));

                    let deltaHtml = '';
                    if (delta !== undefined && delta !== 0) {
                        const sign = delta > 0 ? '+' : (delta < 0 ? '-' : '');
                        const color = delta > 0 ? '#ff4d4d' : '#2ecc71';
                        const absDelta = Math.abs(delta);
                        const fmtDelta = isCount ? absDelta.toLocaleString() : formatMemory(absDelta);
                        deltaHtml = `<span style="color: ${color}; font-size: 0.8em; margin-left: 4px; font-weight: 600;">(${sign}${fmtDelta})</span>`;
                    }

                    return `<div class="memory-item" style="${style}">
                                <span class="memory-label">${label}:</span>
                                <span class="memory-value">${displayVal}${deltaHtml}</span>
                            </div>`;
                };

                const m = process.mem_info || {};

                // Group 1: Core Metrics
                // "Major faults to the first column"
                const col1 = `
                    ${renderItem("PSS", m.pss, m.d_pss, "font-weight: bold; color: var(--primary);")}
                    ${renderItem("RSS", m.rss, m.d_rss)}
                    ${renderItem("Anon", m.anon, m.d_anon)}
                    ${renderItem("File", m.file, m.d_file)}
                    ${renderItem("Swap", m.swap, m.d_swap, "color: var(--danger);")}
                    ${renderItem("Maj Flt", m.pgmajfault, m.d_pgmajfault, "color: var(--danger)", true)}
                `;

                // Group 2: All Other Metrics
                // Removed cgroup-only fields (Kernel, File Map, File Dirty, File WB, Act/Inact Anon/File, Refault, Current, Limit)
                const otherMetrics = [
                    renderItem("Referenced", m.referenced, m.d_referenced),
                    renderItem("Shared", m.shmem, m.d_shmem),
                    renderItem("PTE Tables", m.pagetables, m.d_pagetables),
                    renderItem("Kernel Stk", m.kernel_stack, m.d_kernel_stack),
                    renderItem("Priv Dirty", m.private_dirty, m.d_private_dirty),
                    renderItem("Priv Clean", m.private_clean, m.d_private_clean),

                    renderItem("Shr Dirty", m.shared_dirty, m.d_shared_dirty),
                    renderItem("Shr Clean", m.shared_clean, m.d_shared_clean),
                    renderItem("HugeTLB", m.hugetlb, m.d_hugetlb),
                    renderItem("Faults", (m.pgfault || 0) - (m.pgmajfault || 0), (m.d_pgfault || 0) - (m.d_pgmajfault || 0), "", true)
                ];

                // Chunk into columns of 6
                let col2Html = '';
                const chunkSize = 6;
                for (let i = 0; i < otherMetrics.length; i += chunkSize) {
                    const chunk = otherMetrics.slice(i, i + chunkSize);
                    col2Html += `<div style="display: flex; flex-direction: column; gap: 6px; min-width: 140px; border-left: 1px solid #f0f0f0; padding-left: 15px;">
                        ${chunk.join('')}
                    </div>`;
                }
                memoryRow.innerHTML = `
                       <td colspan="4">
                           <div class="memory-details">
                               <div class="footer-item" style="margin-bottom: 20px; width: 100%;">
                                   <div class="footer-label">Command</div>
                                   <div class="footer-value cmdline-box">
                                       ${process.cmdline || (process.comm ? `[${process.comm}]` : 'N/A')}
                                   </div>
                               </div>

                               <div class="memory-grid">
                                   <!-- Process Identification Column -->
                                   <div class="memory-column" style="min-width: 150px; background: #fcfcfc;">
                                       <div class="memory-item">
                                           <span class="memory-label">PID:</span>
                                           <span class="memory-value" style="color: var(--primary); font-weight: bold;">${process.pid}</span>
                                       </div>
                                       <div class="memory-item">
                                           <span class="memory-label">PPID:</span>
                                           <span class="memory-value">${process.ppid}</span>
                                       </div>
                                       <div class="memory-item">
                                           <span class="memory-label">Comm:</span>
                                           <span class="memory-value" style="font-weight: 600;">${process.comm}</span>
                                       </div>
                                   </div>

                                   <div class="memory-column" style="min-width: 180px;">
                                       ${col1}
                                   </div>
                                   ${col2Html}
                               </div>

                               <div class="details-footer">
                                   <div class="footer-item">
                                       <div class="footer-label">Cgroup</div>
                                       <div class="footer-value cgroup-box">
                                           <span class="cgroup-path-clickable" style="font-family: 'JetBrains Mono', monospace;" onclick="showCgroupInfo(${process.pid}, '${(process.cgroup_path || '/').replace(/\\/g, '\\\\').replace(/'/g, "\\'")}')">
                                               ${process.cgroup_path || '/'}
                                           </span>
                                           <div style="display: flex; gap: 8px; margin-left: auto;">
                                               <button onclick="clearRefs(${process.pid})" class="warning" style="padding: 4px 10px; font-size: 11px;">
                                                   Clear PSS
                                                </button>
                                               <button onclick="moveToCgroup(${process.pid})" class="secondary" style="padding: 4px 10px; font-size: 11px;">
                                                   Move
                                               </button>
                                           </div>
                                       </div>
                                   </div>
                               </div>

                               <!-- Inline details target -->
                               <div id="cgroup-info-${process.pid}" style="display: none; width: 100%;" data-loaded="false"></div>
                           </div>
                       </td>
                    `;

                processTableBody.appendChild(memoryRow);
            }
        }

        // Refresh processes via REST API
        function refreshProcesses() {
            fetch('../_ps')
                .then(response => response.json())
                .then(data => {
                    updateProcessList(data);
                    addLogEntry(`Refreshed process list with ${Object.keys(data).length} processes`, 'success');
                    timeLeft = refreshInterval;
                })
                .catch(error => {
                    addLogEntry(`Failed to refresh processes: ${error.message}`, 'error');
                });
        }


        // Search handler
        function handleSearch() {
            updateProcessList(allProcesses);
        }

        // Event listeners
        refreshButton.addEventListener('click', refreshProcesses);
        document.getElementById('mark-btn').addEventListener('click', markCurrentState);
        searchBox.addEventListener('input', handleSearch);
        sortSelect.addEventListener('change', () => { updateProcessList(allProcesses); });

        // Add keyboard shortcuts
        document.addEventListener('keydown', (event) => {
            if (event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA') return;

            if (event.key === 'r' || event.key === 'R') {
                refreshProcesses();
            } else if (event.key === 'm' || event.key === 'M') {
                markCurrentState();
            }
        });

        setInterval(() => {
            if (isPaused) return;
            timeLeft--;
            if (timeLeft <= 0) {
                refreshProcesses();
            }
            refreshTimerEl.textContent = timeLeft + 's';
        }, 1000);

        // Initial refresh
        // Initial refresh
        const urlParams = new URLSearchParams(window.location.search);
        const searchParam = urlParams.get('search');
        if (searchParam) {
            searchBox.value = searchParam;
        }

        // Auto-mark on initial load
        fetch('../_ps')
            .then(response => response.json())
            .then(data => {
                allProcesses = data;
                markCurrentState(); // Auto-mark
                updateProcessList(data);
                addLogEntry('Initial process list loaded and marked.', 'success');
            })
            .catch(error => {
                addLogEntry(`Failed to load initial processes: ${error.message}`, 'error');
            });


        setTimeout(() => {
            addLogEntry('PMOND web interface loaded successfully', 'success');
            addLogEntry('Ready to monitor system processes', 'info');
        }, 1000);
    </script>
</body>

</html>
