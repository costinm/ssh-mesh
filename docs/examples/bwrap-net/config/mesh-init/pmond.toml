# Process monitor for bwrap-net.
#
# pmond exposes an HTTP API over UDS at:
#
#   $HOME/.run/pmond/control.sock
#
# ssh-mesh can proxy this socket with /_m/_uds/... over its HTTP listener or
# via SSH direct-streamlocal forwarding.

[service]
name = "pmond"
command = "pmond"
args = ["--uds", "control.sock"]
priority = 180
oneshot = false

[resources]
memory_high = "128M"
memory_max = "256M"
cpu_weight = 50

[environment]
PATH = "/out/ssh-mesh/bin:/opt/ssh-mesh/bin"
RUST_LOG = "info"

