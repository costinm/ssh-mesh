#   $HOME/.ssh                 host key and authorized_keys
#   $HOME/.config/ssh-mesh     per-host1 authorized_keys and this mesh.yaml
#   $HOME/.run/ssh-mesh        mux sockets when MUX_DIR is set
#
# Capabilities shown by this node (assuming ssh key/cert configured):
#
#   TCP SSH:          ssh -p 18222 system@127.0.0.1
#   HTTP/admin:       curl http://127.0.0.1:18280/_m/api/ssh/clients
#   SSH over HTTP/2:  ssh -o 'ProxyCommand h2t http://127.0.0.1:18280/_m/_ssh' host2@ignored
#   HTTP UDS proxy:   POST /_m/_uds/home/system/.run/pmond/control.sock

ssh_port: 18222
http_port: 18280
