# Local mesh discovery for host2.
#
# lmesh announces on multicast UDP and serves a small UDS HTTP API at:
#
#   $HOME/.run/lmesh/control.sock
#
# Query it from inside the node with:
#
#   curl --unix-socket "$HOME/.run/lmesh/control.sock" http://localhost/nodes -X POST

[service]
name = "lmesh"
command = "lmesh"
args = ["--uds", "control.sock"]
priority = 190
oneshot = false

[resources]
memory_high = "64M"
memory_max = "128M"
cpu_weight = 50

[environment]
PATH = "/opt/ssh-mesh/bin:/opt/busybox/bin"
RUST_LOG = "info"

