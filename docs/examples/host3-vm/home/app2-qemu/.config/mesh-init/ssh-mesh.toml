# mesh-init service definition for app2-qemu's ssh-mesh node.

[service]
name = "init-ssh-mesh-app2-qemu"
command = "ssh-mesh"
priority = 100
oneshot = false
uid = 103
gid = 103

[[peer]]
uid = 103

[resources]
memory_high = "256M"
memory_max = "512M"
cpu_weight = 100

[environment]
PATH = "/opt/ssh-mesh/bin:/opt/initos/bin:/opt/busybox/bin"
RUST_LOG = "info"
SSH_PORT = "18522"
HTTP_PORT = "18580"
MUX_DIR = "/home/app2/.run/ssh-mesh/mux"
MESH_INIT_SOCK = "/home/app2/.run/mesh-init/control.sock"
SSH_MESH_HOME_ROOT = "/home"
