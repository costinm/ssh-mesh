# Process monitor for app-vm-qemu.

[service]
name = "pmond"
command = "pmond"
args = ["--uds", "control.sock"]
priority = 180
oneshot = false

[resources]
memory_high = "128M"
memory_max = "256M"
cpu_weight = 50

[environment]
PATH = "/out/ssh-mesh/bin:/opt/initos/bin:/opt/busybox/bin"
RUST_LOG = "info"
