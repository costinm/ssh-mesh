[service]
name = "mesh9p-host3-vm"
command = "mesh9p"
args = ["/home/system:/host3-vm:rw", "/tmp/mesh/9p:/imports:rw", "/opt"]
priority = 400
oneshot = false

[resources]
memory_low = "64M"
memory_high = "128M"
cpu_weight = 50

[environment]
RUST_LOG = "info"

[[activation]]
port = 15103
wait = false
