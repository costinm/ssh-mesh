# ssh-mesh node configuration for host3-vm.
#
# Host3-vm is the worker VM example. The expected guest layout is the same as a real
# install:
#
#   $HOME/.ssh
#   $HOME/.config/ssh-mesh/mesh.yaml
#   $HOME/.run/ssh-mesh
#
# Fixed guest ports are forwarded by host3-vm/start.sh when QEMU user networking is
# used:
#
#   host 18322 -> guest 18322
#   host 18380 -> guest 18380

ssh_port: 18322
http_port: 18380
trusted_uds_path: /tmp/mesh/shared/host3-vm/trusted.sock

ssh_routes:
  - name: app2-qemu
    user: system@app2-qemu.example.m
    jump_host: app2-qemu.example.m
    jump_port: 22
    target_host: 127.0.0.1
    target_port: 22
    activation_service: activate-app2-qemu
    client:
      transport: vsock
      user: system
      vsock_cid: 43
      vsock_port: 18522
      uds_path: /tmp/mesh/shared/app2-qemu/trusted.sock

  - name: app3-crosvm
    user: system@app3-crosvm.example.m
    jump_host: app3-crosvm.example.m
    jump_port: 22
    target_host: 127.0.0.1
    target_port: 22
    activation_service: activate-app3-crosvm
    client:
      transport: vsock
      user: system
      vsock_cid: 44
      vsock_port: 18522
      uds_path: /tmp/mesh/shared/app3-crosvm/trusted.sock

  - name: app4-ch
    user: system@app4-ch.example.m
    jump_host: app4-ch.example.m
    jump_port: 22
    target_host: 127.0.0.1
    target_port: 22
    activation_service: activate-app4-ch
    client:
      transport: vsock
      user: system
      vsock_cid: 45
      vsock_port: 18522
      uds_path: /tmp/mesh/shared/app4-ch/trusted.sock
