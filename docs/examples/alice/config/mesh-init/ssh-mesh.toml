# mesh-init service definition for alice's ssh-mesh node.
#
# The start script copies this file to:
#
#   $HOME/.config/mesh-init/ssh-mesh.toml
#
# That is mesh-init's normal user-layout config path. ssh-mesh also uses its
# normal defaults:
#
#   $HOME/.ssh                 key material
#   $HOME/.config/ssh-mesh     mesh.yaml and per-user authorized_keys
#   $HOME/.run/ssh-mesh        mux sockets and local runtime sockets

[service]
name = "init-ssh-mesh-alice"
command = "ssh-mesh"
priority = 100
oneshot = false

[resources]
# These are advisory in unprivileged bubblewrap examples. They are included so
# the config exercises mesh-init's resource model when cgroup access is present.
memory_high = "256M"
memory_max = "512M"
cpu_weight = 100

[environment]
# Include the expected install location first, while still allowing a user's
# normal PATH to provide the binaries.
PATH = "/out/ssh-mesh/bin:/opt/ssh-mesh/bin"
RUST_LOG = "info"

# Fixed and unique TCP listeners for the example mesh. These are env vars
# because ssh-mesh currently reads listener ports from SSH_PORT/HTTP_PORT during
# startup even when mesh.yaml also contains port fields.
SSH_PORT = "18222"
HTTP_PORT = "18280"

# Enable OpenSSH ControlMaster-compatible mux sockets for maintained client
# connections. sshmc can use these sockets from inside the node.
MUX_DIR = "/home/alice/.run/ssh-mesh/mux"

# Alice runs as uid 0 inside the bwrap user namespace. ssh-mesh's root default
# for mesh-init is /run/mesh-init/control.sock, while this example intentionally
# keeps mesh-init in the HOME-relative user layout, so this one override is
# needed.
MESH_INIT_SOCK = "/home/alice/.run/mesh-init/control.sock"

# Terminal/user examples check /home/USER. Inside the sandbox /home is private
# example state, not the host /home.
SSH_MESH_HOME_ROOT = "/home"
