# On-demand activator for the no-network bubblewrap environment.
#
# mesh-init owns /tmp/mesh/shared/bwrap-nonet/trusted.sock in the user
# environment. When a trusted UDS client connects, mesh-init accepts the
# connection and starts bwrap-nonet with that accepted socket wired to
# stdin/stdout. Inside bwrap-nonet, ssh-mesh runs with SSH_MESH_TRUSTED_STDIO=1
# and has no network namespace access.
#
# This is the current config-level primitive. Username-triggered activation
# such as system@bwrap-nonet.example.m needs a small ssh-mesh routing feature
# that maps the requested SSH username/host to this activation socket.

[service]
name = "activate-bwrap-nonet"
command = "/examples/bwrap-nonet/start.sh"
args = ["--stdio"]
priority = 220
oneshot = true

[[activation]]
socket = "/tmp/mesh/shared/bwrap-nonet/trusted.sock"
wait = false

[resources]
memory_high = "384M"
memory_max = "768M"
cpu_weight = 50

[environment]
RUST_LOG = "info"
SSH_MESH_EXAMPLE_ROOT = "/tmp/mesh/state"
