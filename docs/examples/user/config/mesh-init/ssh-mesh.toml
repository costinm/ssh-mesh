# mesh-init service definition for the "user" example host.
#
# user/start.sh runs mesh-init as the invoking non-root user. The config lives
# at the normal default path:
#
#   $HOME/.config/mesh-init/ssh-mesh.toml

[service]
name = "init-ssh-mesh-user"
command = "ssh-mesh"
priority = 100
oneshot = false

[resources]
# Resource limits are harmless if cgroup control is unavailable.
memory_high = "256M"
memory_max = "512M"
cpu_weight = 100

[environment]
PATH = "/out/ssh-mesh/bin:/opt/ssh-mesh/bin"
RUST_LOG = "info"
SSH_PORT = "18422"
HTTP_PORT = "18480"
MUX_DIR = "/home/user/.run/ssh-mesh/mux"
MESH_INIT_SOCK = "/home/user/.run/mesh-init/control.sock"
SSH_MESH_HOME_ROOT = "/home"

