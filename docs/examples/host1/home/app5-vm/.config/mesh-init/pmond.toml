# Process monitor for app5-vm.

[service]
name = "pmond"
command = "pmond"
args = ["--uds", "control.sock"]
priority = 180
oneshot = false

[resources]
memory_high = "128M"
memory_max = "256M"
cpu_weight = 50

[environment]
PATH = "/opt/ssh-mesh/bin:/opt/initos/bin:/opt/busybox/bin"
RUST_LOG = "info"
