# Local mesh discovery for the host1-mode node.

[service]
name = "lmesh"
command = "lmesh"
args = ["--uds", "control.sock"]
priority = 190
oneshot = false

[resources]
memory_high = "64M"
memory_max = "128M"
cpu_weight = 50

[environment]
PATH = "/opt/ssh-mesh/bin:/opt/busybox/bin"
RUST_LOG = "info"

[[peer]]
uid = 1000

[[peer]]
uid = 1001
id = "sshd.mesh.local"
delegate = "*.mesh.local"
