# On-demand activator for the no-network bubblewrap environment.
#
# mesh-init owns /tmp/mesh/shared/app1-bwrap/trusted.sock in the host1
# environment. When a trusted UDS client connects, mesh-init accepts the
# connection and starts app1-bwrap with that accepted socket wired to
# stdin/stdout. Inside app1-bwrap, ssh-mesh runs with SSH_MESH_TRUSTED_STDIO=1
# and has no network namespace access.
#
# This is the current config-level primitive. Username-triggered activation
# such as system@app1-bwrap.example.m needs a small ssh-mesh routing feature
# that maps the requested SSH username/host to this activation socket.

[service]
name = "activate-app1-bwrap"
command = "/tmp/mesh/state/host1/home/app1-bwrap/start.sh"
args = ["--stdio"]
priority = 220
oneshot = true

[[activation]]
socket = "/tmp/mesh/shared/app1-bwrap/trusted.sock"
wait = false

[resources]
memory_high = "384M"
memory_max = "768M"
cpu_weight = 50

[environment]
RUST_LOG = "info"
SSH_MESH_EXAMPLE_ROOT = "/tmp/mesh/state"
