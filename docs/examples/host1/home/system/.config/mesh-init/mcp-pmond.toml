# MCP facade for the host1-mode pmond instance.

[service]
name = "mcp-pmond"
command = "mcp-pmond"
args = ["--uds", "control.sock"]
priority = 200
oneshot = false

[resources]
memory_high = "128M"
memory_max = "256M"
cpu_weight = 50

[environment]
PATH = "/opt/ssh-mesh/bin:/opt/busybox/bin"
RUST_LOG = "info"

# Socket activation: mesh-init listens on pmond's HTTP port.
# pmond is started when a request arrives and handles accept() itself.
[[activation]]
port = 14090
wait = true
