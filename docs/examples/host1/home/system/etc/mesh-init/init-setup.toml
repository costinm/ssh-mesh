# init-setup.toml — Runs before the main application and other services.
# Example: create directories, set permissions, etc.
[Service]
ExecStart = "/opt/busybox/bin/sh -c 'mkdir -p /home/system/mesh9p-export; printf '\"'\"'host1-9p-export-ok\n'\"'\"' >/home/system/mesh9p-export/host1.txt; echo '\"'\"'init-setup complete'\"'\"''"
Type = "oneshot"
OOMScoreAdjust = -990
