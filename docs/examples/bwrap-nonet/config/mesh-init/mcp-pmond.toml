# MCP facade for pmond on bwrap-nonet.
#
# This demonstrates the MCP-over-UDS mode. The socket is:
#
#   $HOME/.run/mcp-pmond/control.sock

[service]
name = "mcp-pmond"
command = "mcp-pmond"
args = ["--uds", "control.sock"]
priority = 200
oneshot = false

[resources]
memory_high = "128M"
memory_max = "256M"
cpu_weight = 50

[environment]
PATH = "/out/ssh-mesh/bin:/opt/ssh-mesh/bin"
RUST_LOG = "info"
