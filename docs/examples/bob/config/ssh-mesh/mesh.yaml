# ssh-mesh node configuration for bob.
#
# Bob is the VM/QEMU example. The expected guest layout is the same as a real
# install:
#
#   $HOME/.ssh
#   $HOME/.config/ssh-mesh/mesh.yaml
#   $HOME/.run/ssh-mesh
#
# Fixed guest ports are forwarded by bob/start.sh when QEMU user networking is
# used:
#
#   host 18322 -> guest 18322
#   host 18380 -> guest 18380

ssh_port: 18322
http_port: 18380
trusted_uds_path: /tmp/mesh/shared/bob/trusted.sock
