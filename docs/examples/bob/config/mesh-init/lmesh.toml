# Local mesh discovery for bob. If the VM uses QEMU user networking, multicast
# discovery may be limited; with tap/bridge networking it should discover alice
# and user just like a normal host.

[service]
name = "lmesh"
command = "lmesh"
args = ["--uds", "control.sock"]
priority = 190
oneshot = false

[resources]
memory_high = "64M"
memory_max = "128M"
cpu_weight = 50

[environment]
PATH = "/out/ssh-mesh/bin:/opt/initos/bin:/opt/busybox/bin"
RUST_LOG = "info"

